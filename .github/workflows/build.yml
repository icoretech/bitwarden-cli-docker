name: Build and publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/icoretech/bitwarden-cli-docker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve tracked Bitwarden CLI version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^ARG BW_VERSION=//p' Dockerfile)"
          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){2}$'; then
            echo "Could not parse BW_VERSION from Dockerfile" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate upstream Bitwarden CLI release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/bitwarden/clients/releases/tags/cli-v${{ steps.version.outputs.version }}" --jq '.tag_name'

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.description=Bitwarden CLI
            org.opencontainers.image.source=https://github.com/icoretech/bitwarden-cli-docker
            org.opencontainers.image.title=bitwarden-cli
            org.opencontainers.image.vendor=iCoreTech, Inc.
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BW_VERSION=${{ steps.version.outputs.version }}
          provenance: false
